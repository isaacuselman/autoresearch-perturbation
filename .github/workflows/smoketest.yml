name: smoketest

on:
  push:
  pull_request:

# Cancel in-progress runs for the same ref so a fast-follow push doesn't
# stack jobs.
concurrency:
  group: smoketest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: Harness end-to-end on synthetic data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (base + fm extras — pipeline.py on this
          branch is Latent Additive and imports torch)
        run: uv sync --extra fm

      - name: Generate synthetic dataset (real-data download is skipped)
        run: uv run prepare_data.py

      - name: Run harness and assert grep-able score line
        run: |
          set -o pipefail
          uv run harness.py 2>&1 | tee run.log
          grep -E "^score: [0-9]" run.log
          grep -E "^coverage: [0-9]" run.log

      - name: Upload run.log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: run-log
          path: run.log
